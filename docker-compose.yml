# doppar-bench — one compose project, one shared PHP image, one shared nginx
# template. Each framework is a compose *profile* so only the stack under test
# (nginx + php-fpm) plus wrk are ever running at once. This keeps the benchmark
# sequential and prevents neighbouring stacks from stealing CPU.
#
#   Fairness invariants baked in here:
#   * identical php image (docker/php)         -> same PHP 8.5, extensions, OPcache, pool
#   * identical nginx image + template          -> same web server tuning
#   * identical container web root (public/)    -> same front-controller path
#   * only FCGI_PASS differs between stacks      -> the php-fpm upstream name
name: doppar-bench

x-php: &php-base
  build:
    context: ./docker/php
  image: doppar-bench/php:8.5
  restart: "no"

x-nginx: &nginx-base
  image: nginx:1.27-alpine
  restart: "no"
  environment:
    NGINX_WEB_ROOT: /var/www/html/public
  volumes:
    - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

services:
  # ---- Doppar (PHP-FPM) -------------------------------------------------
  php-doppar:
    <<: *php-base
    profiles: ["doppar"]
    volumes:
      - ./apps/doppar:/var/www/html
    # Doppar's mandatory per-request session uses the file driver; wrk is
    # cookieless so each request writes a new session file. Keep that on tmpfs
    # (RAM) so we measure framework overhead, not disk churn. See README.
    tmpfs:
      - /var/www/html/storage/framework/sessions:mode=1777

  nginx-doppar:
    <<: *nginx-base
    profiles: ["doppar"]
    environment:
      NGINX_WEB_ROOT: /var/www/html/public
      FCGI_PASS: php-doppar:9000
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./apps/doppar:/var/www/html:ro
    ports:
      - "${BENCH_PORT_DOPPAR:-18010}:80"
    depends_on:
      - php-doppar

  # ---- Doppar (FrankenPHP worker mode, experimental) --------------------
  # Doppar ships no worker runtime; this stack boots the app once and reuses it
  # across requests via a custom FrankenPHP worker script. See README caveats.
  frankenphp-doppar:
    build:
      context: ./docker/frankenphp
    image: doppar-bench/frankenphp:latest
    profiles: ["doppar-worker"]
    restart: "no"
    volumes:
      - ./apps/doppar:/var/www/html
      - ./docker/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
    tmpfs:
      - /var/www/html/storage/framework/sessions:mode=1777
    ports:
      - "${BENCH_PORT_WORKER:-18020}:80"

  # ---- Laravel (Octane + FrankenPHP worker) -----------------------------
  # Laravel's first-party worker runtime (laravel/octane, --server=frankenphp).
  # Same FrankenPHP base image as the other worker stacks; octane:frankenphp
  # uses the frankenphp binary from that image (in PATH), 16 workers.
  laravel-worker:
    build:
      context: ./docker/frankenphp
    image: doppar-bench/frankenphp:latest
    profiles: ["laravel-worker"]
    restart: "no"
    working_dir: /var/www/html
    volumes:
      - ./apps/laravel-worker:/var/www/html
    command: ["frankenphp", "php-cli", "artisan", "octane:frankenphp", "--host=0.0.0.0", "--port=80", "--workers=16", "--admin-port=2019"]
    ports:
      - "${BENCH_PORT_LARAVEL_WORKER:-18050}:80"

  # ---- Symfony (FrankenPHP worker, native) ------------------------------
  # Symfony's official FrankenPHP integration. Since Symfony 7.4 the worker loop
  # is native in symfony/runtime — no extra package, no APP_RUNTIME override; the
  # worker file is the app's own public/index.php. Same base image, 16 workers.
  symfony-worker:
    build:
      context: ./docker/frankenphp
    image: doppar-bench/frankenphp:latest
    profiles: ["symfony-worker"]
    restart: "no"
    working_dir: /var/www/html
    volumes:
      - ./apps/symfony-worker:/var/www/html
      - ./docker/frankenphp/Caddyfile-symfony:/etc/frankenphp/Caddyfile:ro
    ports:
      - "${BENCH_PORT_SYMFONY_WORKER:-18060}:80"

  # ---- Laravel (PHP-FPM) ------------------------------------------------
  php-laravel:
    <<: *php-base
    profiles: ["laravel"]
    volumes:
      - ./apps/laravel:/var/www/html

  nginx-laravel:
    <<: *nginx-base
    profiles: ["laravel"]
    environment:
      NGINX_WEB_ROOT: /var/www/html/public
      FCGI_PASS: php-laravel:9000
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./apps/laravel:/var/www/html:ro
    ports:
      - "${BENCH_PORT_LARAVEL:-18030}:80"
    depends_on:
      - php-laravel

  # ---- Symfony (PHP-FPM) ------------------------------------------------
  php-symfony:
    <<: *php-base
    profiles: ["symfony"]
    volumes:
      - ./apps/symfony:/var/www/html

  nginx-symfony:
    <<: *nginx-base
    profiles: ["symfony"]
    environment:
      NGINX_WEB_ROOT: /var/www/html/public
      FCGI_PASS: php-symfony:9000
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./apps/symfony:/var/www/html:ro
    ports:
      - "${BENCH_PORT_SYMFONY:-18040}:80"
    depends_on:
      - php-symfony

  # ---- wrk load generator ----------------------------------------------
  # Never auto-started (tools profile). Invoked via `docker compose run --rm wrk`
  # so it shares the project network and hits nginx by service name (no host NAT
  # in the measurement path).
  wrk:
    build:
      context: ./docker/wrk
    image: doppar-bench/wrk:4.2.0
    profiles: ["tools"]
    restart: "no"

  # ---- ApacheBench cross-check generator (optional; see bench.sh ab) -----
  # Mirrors the older vendor methodology (ab, no keep-alive). Never in the
  # default `all` run. Invoked via `docker compose run --rm ab`.
  ab:
    build:
      context: ./docker/ab
    image: doppar-bench/ab:latest
    profiles: ["tools"]
    restart: "no"
    # ab -c 1000 opens ~1000 client sockets at once; raise the fd limit so it
    # doesn't die with "socket: Too many open files (24)" at high concurrency.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
