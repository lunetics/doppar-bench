; Identical php-fpm pool for all three frameworks (fairness invariant).
; pm=static with a fixed worker count removes process-spawn jitter from the
; measurement. 16 = the physical core count of the benchmark host
; (i9-12900K: 8 performance + 8 efficiency cores). The host exposes 24 logical
; threads, but we deliberately reserve headroom for nginx, wrk and the kernel
; because the load generator runs on the same machine.
[www]
user = www-data
group = www-data
listen = 9000

pm = static
pm.max_children = 16
pm.max_requests = 0

clear_env = no
catch_workers_output = yes
access.log = /dev/null
