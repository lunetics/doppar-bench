; Identical OPcache configuration for Doppar, Laravel and Symfony.
; validate_timestamps=0 -> production posture: no per-request stat() of sources.
; JIT is explicitly disabled to keep a clean, comparable baseline (JIT effects
; are highly workload-dependent and the vendor snapshot did not enable it).
opcache.enable=1
opcache.enable_cli=0
opcache.validate_timestamps=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=20000
opcache.jit=disable
opcache.jit_buffer_size=0
realpath_cache_size=4096K
realpath_cache_ttl=600
